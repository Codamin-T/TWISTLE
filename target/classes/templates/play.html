<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{design.css}">
    <title>TWISTLE</title>
</head>

<body>
<div class="page">
    <div class="top">
        <header class="header">
            <h1>🍭 TWISTLE 🍬</h1>
        </header>

        <aside class="info">
            <input type="checkbox" id="toggle">

            <label for="toggle" class="toggle">
                How to play
            </label>

            <div class="how-to-play">
                <p>
                    GUess a word made of 2 lette
                    Choose Easy or Hard mode
                    Points & Streak
                    You can alaso use hint if you have 50 points
                </p>
            </div>
        </aside>
    </div>

    <main class="grid">
        <section class="bubbles">

            <div class="bubble-row left">
                <div class="bubble b1"><span class="dot b1"></span>1</div>
            </div>

            <div class="bubble-row right">
                <div class="bubble b2"><span class="dot b2"></span>2</div>
            </div>

            <div class="bubble-row left">
                <div class="bubble b3"><span class="dot b3"></span>3</div>
            </div>

            <div class="bubble-row right">
                <div class="bubble b4"><span class="dot b4"></span>4</div>
            </div>

            <div class="bubble-row left">
                <div class="bubble b5"><span class="dot b5"></span>5</div>
            </div>

            <div class="bubble-row right">
                <div class="bubble b6"><span class="dot b6"></span>6</div>
            </div>

            <div class="bubble-row left">
                <div class="bubble b7"><span class="dot b7"></span>7</div>
            </div>

        </section>
    </main>


    <aside class="sidebar">
        <div class="side-item">🥉Srteak <span id="steak">0</span></div>
        <div class="side-item">⭐ Score <span id="score">0</span></div>
    </aside>


    <div class="candy-bg">
        <span>🍬</span><span>🍭</span><span>🍫</span><span>🍩</span>
        <span>🍪</span><span>🧁</span><span>🍰</span><span>🍇</span>
        <span>🍓</span>
    </div>


    <footer class="legend">
        <div class="legend-item"><span class="mini b1"></span> 2 letters</div>
        <div class="legend-item"><span class="mini b2"></span> 3 letters</div>
        <div class="legend-item"><span class="mini b3"></span> 4 letters</div>
        <div class="legend-item"><span class="mini b4"></span> 5 letters</div>
        <div class="legend-item"><span class="mini b5"></span> 6 letters</div>
        <div class="legend-item"><span class="mini b6"></span> 7 letters</div>
        <div class="legend-item"><span class="mini b7"></span> 8 letters</div>
    </footer>

</div>

</body>
</html>
